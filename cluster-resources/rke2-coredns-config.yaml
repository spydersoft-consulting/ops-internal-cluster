apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: rke2-coredns
  namespace: kube-system
spec:
  valuesContent: |-
    # Chart default is 100m/128Mi request+limit (rke2-coredns-1.45.212,
    # confirmed via `kubectl get pod ... -o jsonpath='{.spec.containers[0].resources}'`
    # and cross-checked against the chart's own values.yaml). So this
    # Deployment *was* scheduler-visible already - just at an arbitrary
    # chart default, not one informed by real usage. Observed usage is
    # ~9-16m; CPU request trimmed to reflect that. CPU limit and memory
    # request/limit intentionally left at the chart default (out of scope
    # here).
    resources:
      requests:
        cpu: 15m
    servers:
    - zones:
      - zone: .

      port: 53
      # If serviceType is nodePort you can specify nodePort here
      # nodePort: 30053
      plugins:
      - name: errors
      # Serves a /health endpoint on :8080, required for livenessProbe
      - name: health
        configBlock: |-
          lameduck 5s
      # Serves a /ready endpoint on :8181, required for readinessProbe
      - name: ready
      # Required to query kubernetes API for data
      - name: kubernetes
        parameters: cluster.local in-addr.arpa ip6.arpa
        configBlock: |-
          pods insecure
          fallthrough in-addr.arpa ip6.arpa
          ttl 30
      # Serves a /metrics endpoint on :9153, required for serviceMonitor
      - name: prometheus
        parameters: 0.0.0.0:9153
      - name: forward
        parameters: . 192.168.1.1
      - name: cache
        parameters: 30
      - name: loop
      - name: reload
      - name: loadbalance
