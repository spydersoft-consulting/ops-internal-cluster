ingress:
  main:
    enabled: false
service:
  main:
    annotations:
      metrics.spydersoft.io/scrape: "true"
      metrics.spydersoft.io/scheme: http
      metrics.spydersoft.io/path: /metrics
      metrics.spydersoft.io/port: "9130"
    ports:
      http:
        enabled: false
      metrics:
        protocol: TCP
        primary: true
        enabled: true
        port: 9130
    type: ClusterIP
    controller: main
    primary: true
influxdb:
  persistence:
    enabled: false
  architecture: standalone
  authEnabled: false
  enabled: false
  database: unifi
serviceMonitor:
  main:
    endpoints:
    - scheme: http
      port: metrics
      interval: 1m
      path: /metrics
      scrapeTimeout: 30s
    enabled: false
    serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}'
controllers:
  main:
    revisionHistoryLimit: 3
    enabled: true
    replicas: 1
    containers:
      main:
        envFrom:
        - secretRef:
            name: unifi-poller
        env:
          TZ: America/New_York
          UP_INFLUXDB_DISABLE: true
          UP_UNIFI_DEFAULT_URL: https://unifi
        probes:
          liveness:
            spec:
              initialDelaySeconds: 0
              timeoutSeconds: 1
              failureThreshold: 3
              periodSeconds: 10
            type: TCP
            enabled: true
            custom: false
          readiness:
            spec:
              initialDelaySeconds: 0
              timeoutSeconds: 1
              failureThreshold: 3
              periodSeconds: 10
            type: TCP
            enabled: true
            custom: false
          startup:
            spec:
              initialDelaySeconds: 0
              timeoutSeconds: 1
              failureThreshold: 30
              periodSeconds: 5
            type: TCP
            enabled: true
            custom: false
        image:
          repository: ghcr.io/unpoller/unpoller
          pullPolicy: IfNotPresent
          tag: v3.2.0
    type: deployment
    strategy: Recreate

