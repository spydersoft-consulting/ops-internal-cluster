controllers:
  main:
    containers:
      main:
        envFrom:
        - secretRef:
            name: unifi-poller
        probes:
          liveness:
            custom: false
            type: TCP
            enabled: true
            spec:
              periodSeconds: 10
              initialDelaySeconds: 0
              timeoutSeconds: 1
              failureThreshold: 3
          readiness:
            custom: false
            type: TCP
            enabled: true
            spec:
              periodSeconds: 10
              initialDelaySeconds: 0
              timeoutSeconds: 1
              failureThreshold: 3
          startup:
            custom: false
            type: TCP
            enabled: true
            spec:
              periodSeconds: 5
              initialDelaySeconds: 0
              timeoutSeconds: 1
              failureThreshold: 30
        image:
          repository: ghcr.io/unpoller/unpoller
          pullPolicy: IfNotPresent
          tag: v3.3.1
        env:
          UP_UNIFI_DEFAULT_URL: https://unifi
          UP_INFLUXDB_DISABLE: true
          TZ: America/New_York
        # No CPU request previously set. Observed usage was bursty
        # (~1-22m across samples, tracks UniFi controller poll interval).
        # Requested below the low end of steady-state rather than the
        # bursts.
        resources:
          requests:
            cpu: 10m
    replicas: 1
    enabled: true
    revisionHistoryLimit: 3
    strategy: Recreate
    type: deployment
influxdb:
  persistence:
    enabled: false
  architecture: standalone
  enabled: false
  database: unifi
  authEnabled: false
serviceMonitor:
  main:
    serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}'
    enabled: false
    endpoints:
    - scheme: http
      interval: 1m
      path: /metrics
      scrapeTimeout: 30s
      port: metrics
service:
  main:
    type: ClusterIP
    controller: main
    ports:
      http:
        enabled: false
      metrics:
        port: 9130
        protocol: TCP
        primary: true
        enabled: true
    primary: true
    annotations:
      metrics.spydersoft.io/port: "9130"
      metrics.spydersoft.io/scrape: "true"
      metrics.spydersoft.io/path: /metrics
      metrics.spydersoft.io/scheme: http
ingress:
  main:
    enabled: false

