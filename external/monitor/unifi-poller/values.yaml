ingress:
  main:
    enabled: false
controllers:
  main:
    replicas: 1
    type: deployment
    enabled: true
    strategy: Recreate
    revisionHistoryLimit: 3
    containers:
      main:
        image:
          tag: v3.1.2
          pullPolicy: IfNotPresent
          repository: ghcr.io/unpoller/unpoller
        probes:
          liveness:
            spec:
              failureThreshold: 3
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
            custom: false
            type: TCP
            enabled: true
          startup:
            spec:
              failureThreshold: 30
              initialDelaySeconds: 0
              periodSeconds: 5
              timeoutSeconds: 1
            custom: false
            type: TCP
            enabled: true
          readiness:
            spec:
              failureThreshold: 3
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
            custom: false
            type: TCP
            enabled: true
        envFrom:
        - secretRef:
            name: unifi-poller
        env:
          TZ: America/New_York
          UP_INFLUXDB_DISABLE: true
          UP_UNIFI_DEFAULT_URL: https://unifi
influxdb:
  database: unifi
  persistence:
    enabled: false
  authEnabled: false
  enabled: false
  architecture: standalone
service:
  main:
    annotations:
      metrics.spydersoft.io/scheme: http
      metrics.spydersoft.io/scrape: "true"
      metrics.spydersoft.io/port: "9130"
      metrics.spydersoft.io/path: /metrics
    type: ClusterIP
    controller: main
    primary: true
    ports:
      http:
        enabled: false
      metrics:
        port: 9130
        enabled: true
        protocol: TCP
        primary: true
serviceMonitor:
  main:
    serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}'
    endpoints:
    - path: /metrics
      scrapeTimeout: 30s
      scheme: http
      interval: 1m
      port: metrics
    enabled: false

