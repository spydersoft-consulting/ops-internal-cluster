influxdb:
  authEnabled: false
  persistence:
    enabled: false
  database: unifi
  architecture: standalone
  enabled: false
service:
  main:
    annotations:
      metrics.spydersoft.io/port: "9130"
      metrics.spydersoft.io/scheme: http
      metrics.spydersoft.io/scrape: "true"
      metrics.spydersoft.io/path: /metrics
    primary: true
    ports:
      http:
        enabled: false
      metrics:
        primary: true
        enabled: true
        protocol: TCP
        port: 9130
    controller: main
    type: ClusterIP
serviceMonitor:
  main:
    serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}'
    enabled: false
    endpoints:
    - path: /metrics
      interval: 1m
      port: metrics
      scheme: http
      scrapeTimeout: 30s
ingress:
  main:
    enabled: false
controllers:
  main:
    strategy: Recreate
    revisionHistoryLimit: 3
    containers:
      main:
        image:
          repository: ghcr.io/unpoller/unpoller
          tag: v3.3.0
          pullPolicy: IfNotPresent
        env:
          TZ: America/New_York
          UP_INFLUXDB_DISABLE: true
          UP_UNIFI_DEFAULT_URL: https://unifi
        envFrom:
        - secretRef:
            name: unifi-poller
        probes:
          liveness:
            custom: false
            enabled: true
            spec:
              initialDelaySeconds: 0
              periodSeconds: 10
              failureThreshold: 3
              timeoutSeconds: 1
            type: TCP
          readiness:
            custom: false
            enabled: true
            spec:
              initialDelaySeconds: 0
              periodSeconds: 10
              failureThreshold: 3
              timeoutSeconds: 1
            type: TCP
          startup:
            custom: false
            enabled: true
            spec:
              initialDelaySeconds: 0
              periodSeconds: 5
              failureThreshold: 30
              timeoutSeconds: 1
            type: TCP
    replicas: 1
    type: deployment
    enabled: true

