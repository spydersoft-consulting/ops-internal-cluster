influxdb:
  architecture: standalone
  enabled: false
  authEnabled: false
  persistence:
    enabled: false
  database: unifi
service:
  main:
    ports:
      metrics:
        protocol: TCP
        port: 9130
        enabled: true
        primary: true
      http:
        enabled: false
    annotations:
      metrics.spydersoft.io/port: "9130"
      metrics.spydersoft.io/scrape: "true"
      metrics.spydersoft.io/path: /metrics
      metrics.spydersoft.io/scheme: http
    type: ClusterIP
    controller: main
    primary: true
serviceMonitor:
  main:
    endpoints:
    - scrapeTimeout: 30s
      scheme: http
      port: metrics
      path: /metrics
      interval: 1m
    enabled: false
    serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}'
ingress:
  main:
    enabled: false
controllers:
  main:
    strategy: Recreate
    enabled: true
    containers:
      main:
        image:
          pullPolicy: IfNotPresent
          tag: v2.38.0
          repository: ghcr.io/unpoller/unpoller
        envFrom:
        - secretRef:
            name: unifi-poller
        env:
          UP_UNIFI_DEFAULT_URL: https://unifi
          UP_INFLUXDB_DISABLE: true
          TZ: America/New_York
        probes:
          readiness:
            custom: false
            enabled: true
            type: TCP
            spec:
              periodSeconds: 10
              initialDelaySeconds: 0
              timeoutSeconds: 1
              failureThreshold: 3
          startup:
            custom: false
            enabled: true
            type: TCP
            spec:
              periodSeconds: 5
              initialDelaySeconds: 0
              timeoutSeconds: 1
              failureThreshold: 30
          liveness:
            custom: false
            enabled: true
            type: TCP
            spec:
              periodSeconds: 10
              initialDelaySeconds: 0
              timeoutSeconds: 1
              failureThreshold: 3
    revisionHistoryLimit: 3
    type: deployment
    replicas: 1

