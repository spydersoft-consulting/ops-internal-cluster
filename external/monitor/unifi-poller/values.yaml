influxdb:
  architecture: standalone
  enabled: false
  authEnabled: false
  persistence:
    enabled: false
  database: unifi
controllers:
  main:
    replicas: 1
    containers:
      main:
        probes:
          startup:
            custom: false
            spec:
              failureThreshold: 30
              initialDelaySeconds: 0
              timeoutSeconds: 1
              periodSeconds: 5
            type: TCP
            enabled: true
          readiness:
            custom: false
            spec:
              failureThreshold: 3
              initialDelaySeconds: 0
              timeoutSeconds: 1
              periodSeconds: 10
            type: TCP
            enabled: true
          liveness:
            custom: false
            spec:
              failureThreshold: 3
              initialDelaySeconds: 0
              timeoutSeconds: 1
              periodSeconds: 10
            type: TCP
            enabled: true
        env:
          UP_UNIFI_DEFAULT_URL: https://unifi
          TZ: America/New_York
          UP_INFLUXDB_DISABLE: true
        envFrom:
        - secretRef:
            name: unifi-poller
        image:
          tag: v2.39.0
          repository: ghcr.io/unpoller/unpoller
          pullPolicy: IfNotPresent
    enabled: true
    strategy: Recreate
    type: deployment
    revisionHistoryLimit: 3
ingress:
  main:
    enabled: false
service:
  main:
    controller: main
    annotations:
      metrics.spydersoft.io/path: /metrics
      metrics.spydersoft.io/scrape: "true"
      metrics.spydersoft.io/port: "9130"
      metrics.spydersoft.io/scheme: http
    ports:
      http:
        enabled: false
      metrics:
        protocol: TCP
        primary: true
        enabled: true
        port: 9130
    type: ClusterIP
    primary: true
serviceMonitor:
  main:
    serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}'
    endpoints:
    - interval: 1m
      scheme: http
      path: /metrics
      port: metrics
      scrapeTimeout: 30s
    enabled: false

