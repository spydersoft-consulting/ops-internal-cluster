apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-infrastructure-dashboards
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Infrastructure
data:
  # Extracted from the live Grafana instance (previously UI-only, only
  # surviving via the Postgres backup job rather than as code) so these
  # are diffable and rebuild-safe like everything else provisioned here.
  # `uid`s are preserved so existing links/bookmarks keep working.
  #
  # Datasource UIDs were rewritten while extracting: these dashboards
  # pre-date the Mimir-internal/production/nonproduction datasources
  # added in this pass and pointed directly at randomly-generated UIDs
  # from manually-created datasources (now duplicates - see cleanup
  # note below).
  #
  # kubernetes-cluster, main, node-exporter-full, kubernetes-ingress-nginx
  # and rabbitmq-overview were dropped during extraction - replacements
  # for these are coming separately; nginx-ingress and rabbitmq don't
  # apply to this environment at all (envoy-gateway, not nginx-ingress;
  # no RabbitMQ deployed).
  garage.json: |-
{{ .Files.Get "dashboard-src/garage.json" | indent 4 }}
  vault.json: |-
{{ .Files.Get "dashboard-src/vault.json" | indent 4 }}
