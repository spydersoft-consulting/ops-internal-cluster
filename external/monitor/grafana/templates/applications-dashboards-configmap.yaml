apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-applications-dashboards
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Applications
data:
  # Extracted from the live Grafana instance - see infrastructure-dashboards-configmap.yaml
  # for the full note on datasource UID rewriting during extraction.
  redis-nonproduction.json: |-
{{ .Files.Get "dashboard-src/redis-nonproduction.json" | indent 4 }}
  redis-production.json: |-
{{ .Files.Get "dashboard-src/redis-production.json" | indent 4 }}
