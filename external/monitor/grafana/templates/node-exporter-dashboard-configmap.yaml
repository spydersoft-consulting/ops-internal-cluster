apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-node-exporter-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Infrastructure
data:
  # Split out from infrastructure-dashboards-configmap.yaml: at 674KB on
  # its own, combining it with anything else there would exceed
  # Kubernetes' 1MiB ConfigMap size limit.
  #
  # Was already pointing at a datasource UID that no longer exists in
  # Grafana at all (see infrastructure-dashboards-configmap.yaml's note),
  # so it's unclear this ever had live data - node_exporter isn't scraped
  # anywhere in the current Alloy configs (see the Kubernetes dashboards'
  # notes on the same gap). Repointed to Mimir-internal and kept as-is
  # rather than dropped since it costs nothing sitting unused, but don't
  # expect data until node_exporter actually gets deployed to cluster
  # nodes.
  node-exporter-full.json: |-
{{ .Files.Get "dashboard-src/node-exporter-full.json" | indent 4 }}
