persistence:
  postgres-init-data:
    type: configMap
    advancedMounts:
      postgres:
        main:
        - subPath: init-data.sh
          path: /docker-entrypoint-initdb.d/init-grafana-user.sh
    identifier: postgres-init-data
    enabled: true
  postgres-data:
    size: 300Gi
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    enabled: true
    type: persistentVolumeClaim
    storageClass: nfs-client
    accessMode: ReadWriteMany
  postgres-secrets:
    type: secret
    name: postgres-secrets
    enabled: true
service:
  postgres:
    type: ClusterIP
    primary: false
    controller: postgres
    ports:
      postgres:
        port: 5432
        enabled: true
  main:
    enabled: false
global:
  nameOverride: postgres
grafanaBackup:
  image:
    repository: dealfa/grafana-backup-tool
    tag: v1.6.3
  schedule: 0 4 * * *
  enabled: true
controllers:
  postgres:
    revisionHistoryLimit: 3
    enabled: true
    type: deployment
    containers:
      main:
        envFrom:
        - secretRef:
            name: postgres-secrets
        image:
          repository: postgres
          pullPolicy: IfNotPresent
          tag: 17
        env:
        - name: POSTGRES_PORT
          value: 5432
        - name: POSTGRES_HOST
          value: postgres-service
        - name: POSTGRES_DB
          value: grafana
        strategy:
          type: Recreate
    strategy: Recreate
    replicas: 1
  main:
    enabled: false
grafana:
  revisionHistoryLimit: 1
  persistence:
    enabled: true
    storageClassName: nfs-client
  grafana.ini:
    azure:
      managed_identity_enabled: true
    database:
      type: postgres
      name: grafana
      host: grafana-postgres
    auth.azuread:
      name: Azure AD
      scopes: openid email profile
      auth_url: https://login.microsoftonline.com/70965cdd-c60c-4109-9fcf-709b2f23bd0c/oauth2/v2.0/authorize
      allow_sign_up: true
      enabled: true
      role_attribute_strict: false
      token_url: https://login.microsoftonline.com/70965cdd-c60c-4109-9fcf-709b2f23bd0c/oauth2/v2.0/token
    server:
      root_url: https://grafana.mattgerega.net
      domain: grafana.mattgerega.net
  serviceMonitor:
    enabled: false
  service:
    annotations:
      linkerd.io/inject: enabled
  admin:
    existingSecret: grafana-admin-secret
    passwordKey: GRAFANA_ADMIN_PASSWORD
    userKey: GRAFANA_ADMIN_USER
  podAnnotations:
    linkerd.io/inject: enabled
  plugins:
  - grafana-piechart-panel
  envFromSecret: grafana-auth-secret
  ingress:
    tls: []
    enabled: false
    path: /
    hosts:
    - grafana.mattgerega.net
    annotations:
      nginx.ingress.kubernetes.io/service-upstream: "true"
      kubernetes.io/ingress.class: nginx
    pathType: Prefix
configMaps:
  postgres-init-data:
    enabled: true
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
            ALTER DATABASE ${POSTGRES_DB} OWNER TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi

