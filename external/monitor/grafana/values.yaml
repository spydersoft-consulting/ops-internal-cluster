persistence:
  postgres-init-data:
    type: configMap
    advancedMounts:
      postgres:
        main:
        - subPath: init-data.sh
          path: /docker-entrypoint-initdb.d/init-grafana-user.sh
    identifier: postgres-init-data
    enabled: true
  postgres-data:
    size: 300Gi
    advancedMounts:
      postgres:
        main:
        - path: /var/lib/postgresql/data
    enabled: true
    type: persistentVolumeClaim
    storageClass: nfs-client
    accessMode: ReadWriteMany
  postgres-secrets:
    type: secret
    name: postgres-secrets
    enabled: true
service:
  postgres:
    type: ClusterIP
    primary: false
    controller: postgres
    ports:
      postgres:
        port: 5432
        enabled: true
  main:
    enabled: false
global:
  nameOverride: postgres
grafanaBackup:
  image:
    repository: dealfa/grafana-backup-tool
    tag: v1.5.0
  schedule: 0 4 * * *
  enabled: true
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  # No live usage sample available - short-lived batch job, `kubectl top`
  # only ever catches it "Completed". Conservative placeholder based on
  # similar lightweight backup/cron tooling.
  # TODO: verify against live usage (e.g. capture with a metrics scrape
  # while a run is in progress, or check container runtime cpu stats).
  resources:
    requests:
      cpu: 25m
controllers:
  postgres:
    revisionHistoryLimit: 3
    enabled: true
    type: deployment
    containers:
      main:
        envFrom:
        - secretRef:
            name: postgres-secrets
        image:
          repository: postgres
          pullPolicy: IfNotPresent
          tag: 17
        # No CPU request previously set. Observed usage ~20-27m.
        resources:
          requests:
            cpu: 20m
        env:
        - name: POSTGRES_PORT
          value: 5432
        - name: POSTGRES_HOST
          value: postgres-service
        - name: POSTGRES_DB
          value: grafana
        strategy:
          type: Recreate
    strategy: Recreate
    replicas: 1
  main:
    enabled: false
grafana:
  revisionHistoryLimit: 1
  # No CPU request previously set. Observed usage steady at ~67m.
  resources:
    requests:
      cpu: 50m
  persistence:
    enabled: true
    storageClassName: nfs-client
  grafana.ini:
    azure:
      managed_identity_enabled: true
    database:
      type: postgres
      name: grafana
      host: grafana-postgres
    auth.azuread:
      name: Azure AD
      scopes: openid email profile
      auth_url: https://login.microsoftonline.com/70965cdd-c60c-4109-9fcf-709b2f23bd0c/oauth2/v2.0/authorize
      allow_sign_up: true
      enabled: true
      role_attribute_strict: false
      token_url: https://login.microsoftonline.com/70965cdd-c60c-4109-9fcf-709b2f23bd0c/oauth2/v2.0/token
    server:
      root_url: https://grafana.mattgerega.net
      domain: grafana.mattgerega.net
  serviceMonitor:
    enabled: false
  service:
    annotations:
      linkerd.io/inject: enabled
  admin:
    existingSecret: grafana-admin-secret
    passwordKey: GRAFANA_ADMIN_PASSWORD
    userKey: GRAFANA_ADMIN_USER
  podAnnotations:
    linkerd.io/inject: enabled
  plugins:
  - grafana-piechart-panel
  envFromSecret: grafana-auth-secret
  ingress:
    tls: []
    enabled: false
    path: /
    hosts:
    - grafana.mattgerega.net
    annotations:
      nginx.ingress.kubernetes.io/service-upstream: "true"
      kubernetes.io/ingress.class: nginx
    pathType: Prefix
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      folderAnnotation: grafana_folder
      provider:
        # Required for folderAnnotation to actually create/place dashboards
        # into folders - without this, the sidecar drops every dashboard at
        # the provider's root regardless of the annotation (confirmed: this
        # was `false` and every dashboard landed at the root while the
        # Kubernetes/Observability Stack folders sat empty).
        foldersFromFilesStructure: true
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        # Explicit `uid`s (rather than letting Grafana generate one) so
        # alert rules and dashboards can reference these deterministically
        # in file-based provisioning instead of a UID that only exists
        # after the datasource is created.
        - name: Mimir-internal
          uid: mimir-internal
          type: prometheus
          access: proxy
          url: http://mimir-gateway.monitoring.svc.cluster.local/prometheus
          jsonData:
            httpHeaderName1: X-Scope-OrgID
            # Grafana Alloy scrapes Mimir's own metrics on a 60s interval, but
            # this wasn't set - Grafana defaulted to assuming 15s, so
            # $__rate_interval (max(4x scrape_interval, step)) resolved to
            # just 60s. A 1m rate() window against a 60s-spaced series often
            # contains 0-1 raw samples, which isn't enough to compute a rate,
            # so any dashboard panel querying raw counters directly (not
            # through a mixin recording rule, which uses a fixed [2m] window)
            # showed "No data" (2026-07-16, e.g. Mimir/Overview "Write
            # requests / sec").
            timeInterval: 1m
          secureJsonData:
            httpHeaderValue1: internal
        - name: Mimir-production
          uid: mimir-production
          type: prometheus
          access: proxy
          url: http://mimir-gateway.monitoring.svc.cluster.local/prometheus
          jsonData:
            httpHeaderName1: X-Scope-OrgID
            timeInterval: 1m
          secureJsonData:
            httpHeaderValue1: production
        - name: Mimir-nonproduction
          uid: mimir-nonproduction
          type: prometheus
          access: proxy
          url: http://mimir-gateway.monitoring.svc.cluster.local/prometheus
          jsonData:
            httpHeaderName1: X-Scope-OrgID
            timeInterval: 1m
          secureJsonData:
            httpHeaderValue1: nonproduction
        - name: Loki-internal
          uid: loki-internal
          type: loki
          access: proxy
          url: http://loki-gateway.monitoring.svc.cluster.local
          jsonData:
            httpHeaderName1: X-Scope-OrgID
          secureJsonData:
            httpHeaderValue1: internal
        - name: Loki-production
          uid: loki-production
          type: loki
          access: proxy
          url: http://loki-gateway.monitoring.svc.cluster.local
          jsonData:
            httpHeaderName1: X-Scope-OrgID
          secureJsonData:
            httpHeaderValue1: production
        - name: Loki-nonproduction
          uid: loki-nonproduction
          type: loki
          access: proxy
          url: http://loki-gateway.monitoring.svc.cluster.local
          jsonData:
            httpHeaderName1: X-Scope-OrgID
          secureJsonData:
            httpHeaderValue1: nonproduction
        - name: Tempo-internal
          uid: tempo-internal
          type: tempo
          access: proxy
          url: http://tempo-gateway.monitoring.svc.cluster.local
          jsonData:
            httpHeaderName1: X-Scope-OrgID
          secureJsonData:
            httpHeaderValue1: internal
        - name: Tempo-production
          uid: tempo-production
          type: tempo
          access: proxy
          url: http://tempo-gateway.monitoring.svc.cluster.local
          jsonData:
            httpHeaderName1: X-Scope-OrgID
          secureJsonData:
            httpHeaderValue1: production
        - name: Tempo-nonproduction
          uid: tempo-nonproduction
          type: tempo
          access: proxy
          url: http://tempo-gateway.monitoring.svc.cluster.local
          jsonData:
            httpHeaderName1: X-Scope-OrgID
          secureJsonData:
            httpHeaderValue1: nonproduction
  alerting:
    rules.yaml:
      apiVersion: 1
      groups:
        - orgId: 1
          name: kubernetes-health
          folder: Kubernetes
          interval: 1m
          rules:
            - uid: kube-node-not-ready
              title: Kubernetes Node Not Ready
              condition: A
              for: 10m
              noDataState: OK
              data:
                - refId: A
                  relativeTimeRange:
                    from: 300
                    to: 0
                  datasourceUid: mimir-internal
                  model:
                    expr: kube_node_status_condition{condition="Ready", status="true"} == 0
                    intervalMs: 60000
                    maxDataPoints: 43200
              annotations:
                summary: A Kubernetes node has been reporting condition Ready=false for 10+ minutes.
                description: Check node, cluster, and pod labels on the firing instance for which node/cluster.
              labels:
                severity: critical
            - uid: kube-pod-crashlooping
              title: Kubernetes Pod CrashLoopBackOff
              condition: A
              for: 10m
              noDataState: OK
              data:
                - refId: A
                  relativeTimeRange:
                    from: 300
                    to: 0
                  datasourceUid: mimir-internal
                  model:
                    expr: kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"} == 1
                    intervalMs: 60000
                    maxDataPoints: 43200
              annotations:
                summary: A container has been in CrashLoopBackOff for 10+ minutes.
                description: Check namespace/pod/container/cluster labels on the firing instance.
              labels:
                severity: warning
            - uid: kube-deployment-replicas-unavailable
              title: Kubernetes Deployment Replicas Unavailable
              condition: A
              for: 15m
              noDataState: OK
              data:
                - refId: A
                  relativeTimeRange:
                    from: 300
                    to: 0
                  datasourceUid: mimir-internal
                  model:
                    expr: kube_deployment_status_replicas_unavailable > 0
                    intervalMs: 60000
                    maxDataPoints: 43200
              annotations:
                summary: A Deployment has had unavailable replicas for 15+ minutes.
                description: Check namespace/deployment/cluster labels on the firing instance.
              labels:
                severity: warning
            - uid: kube-pvc-pending
              title: Kubernetes PVC Pending
              condition: A
              for: 15m
              noDataState: OK
              data:
                - refId: A
                  relativeTimeRange:
                    from: 300
                    to: 0
                  datasourceUid: mimir-internal
                  model:
                    expr: kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
                    intervalMs: 60000
                    maxDataPoints: 43200
              annotations:
                summary: A PVC has been stuck Pending for 15+ minutes.
                description: Check namespace/persistentvolumeclaim/cluster labels - likely a storage class/provisioner issue.
              labels:
                severity: warning
      
        - orgId: 1
          name: observability-stack-health
          folder: Observability Stack
          interval: 1m
          rules:
            - uid: mimir-component-down
              title: Mimir Component Down
              condition: A
              for: 5m
              noDataState: OK
              data:
                - refId: A
                  relativeTimeRange:
                    from: 300
                    to: 0
                  datasourceUid: mimir-internal
                  model:
                    expr: up{job=~".*/(distributor|ingester|compactor|store-gateway|querier|query-frontend|ruler|alertmanager)"} == 0
                    intervalMs: 60000
                    maxDataPoints: 43200
              annotations:
                summary: A Mimir component has been down for 5+ minutes.
                description: Check the job label on the firing instance for which component.
              labels:
                severity: critical
            - uid: mimir-samples-discarded
              title: Mimir Discarding Samples
              condition: A
              for: 10m
              noDataState: OK
              data:
                - refId: A
                  relativeTimeRange:
                    from: 900
                    to: 0
                  datasourceUid: mimir-internal
                  model:
                    expr: sum by (reason) (increase(cortex_discarded_samples_total[15m])) > 0
                    intervalMs: 60000
                    maxDataPoints: 43200
              annotations:
                summary: Mimir is discarding samples.
                description: This is how the 2026-07 WAL-replay/out-of-order incident first showed up - catch it before dashboards go dark instead of after. Check the reason label on the firing instance.
              labels:
                severity: warning
            - uid: loki-component-down
              title: Loki Component Down
              condition: A
              for: 5m
              noDataState: OK
              data:
                - refId: A
                  relativeTimeRange:
                    from: 300
                    to: 0
                  datasourceUid: mimir-internal
                  model:
                    expr: up{job=~".*/loki-(write|read|backend)"} == 0
                    intervalMs: 60000
                    maxDataPoints: 43200
              annotations:
                summary: A Loki component has been down for 5+ minutes.
                description: Check the job label on the firing instance for which component.
              labels:
                severity: critical
            - uid: tempo-component-down
              title: Tempo Component Down
              condition: A
              for: 5m
              noDataState: OK
              data:
                - refId: A
                  relativeTimeRange:
                    from: 300
                    to: 0
                  datasourceUid: mimir-internal
                  model:
                    expr: up{job=~".*/(distributor|ingester|compactor|querier|query-frontend|metrics-generator)"} == 0
                    intervalMs: 60000
                    maxDataPoints: 43200
              annotations:
                summary: A Tempo component has been down for 5+ minutes.
                description: Check the job label on the firing instance for which component.
              labels:
                severity: critical
      
        - orgId: 1
          name: garage-storage
          folder: Observability Stack
          interval: 5m
          rules:
            - uid: garage-storage-70
              title: Garage Storage 70% Full
              condition: A
              for: 10m
              noDataState: OK
              data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: mimir-internal
                  model:
                    expr: (sum(garage_local_disk_total{volume="data"}) - sum(garage_local_disk_avail{volume="data"})) / sum(garage_local_disk_total{volume="data"}) > 0.7
                    intervalMs: 60000
                    maxDataPoints: 43200
              annotations:
                summary: Garage object storage is over 70% full.
                description: Consider adding capacity - see the query value for the exact percentage.
              labels:
                severity: warning
            - uid: garage-storage-85
              title: Garage Storage 85% Full
              condition: A
              for: 10m
              noDataState: OK
              data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: mimir-internal
                  model:
                    expr: (sum(garage_local_disk_total{volume="data"}) - sum(garage_local_disk_avail{volume="data"})) / sum(garage_local_disk_total{volume="data"}) > 0.85
                    intervalMs: 60000
                    maxDataPoints: 43200
              annotations:
                summary: Garage object storage is over 85% full - CRITICAL.
                description: Immediate action required - this backs Mimir/Loki/Tempo block storage.
              labels:
                severity: critical
            - uid: garage-cluster-unhealthy
              title: Garage Cluster Unhealthy
              condition: A
              for: 5m
              noDataState: OK
              data:
                - refId: A
                  relativeTimeRange:
                    from: 300
                    to: 0
                  datasourceUid: mimir-internal
                  model:
                    expr: garage_cluster_healthy < 1
                    intervalMs: 60000
                    maxDataPoints: 43200
              annotations:
                summary: Garage cluster is unhealthy.
                description: Not all Garage storage nodes are connected. Check node connectivity.
              labels:
                severity: critical
            - uid: garage-resync-errors
              title: Garage Block Resync Errors
              condition: A
              for: 10m
              noDataState: OK
              data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: mimir-internal
                  model:
                    expr: garage_block_resync_errored_blocks > 0
                    intervalMs: 60000
                    maxDataPoints: 43200
              annotations:
                summary: Garage has block resync errors.
                description: Blocks are failing to resync - potential data-loss risk for Mimir/Loki/Tempo backing storage.
              labels:
                severity: critical

        - orgId: 1
          name: proxmox-health
          folder: Observability Stack
          interval: 5m
          rules:
            # Host-down uses absent_over_time rather than the up == 0 idiom used
            # elsewhere in this file: Alloy on pxdell/pxhp pushes via remote_write
            # (see the Proxmox monitoring follow-up plan) instead of being
            # centrally scraped, so a dead host's `up` series goes stale and
            # disappears rather than reporting 0. One rule per host because
            # absent_over_time only preserves labels from equality matchers, not
            # the regex match a single combined rule would need.
            #
            # The other rules below wrap their expr in max by (id) (...): pxdell
            # and pxhp each run their own pve-exporter, but Proxmox's cluster API
            # means each exporter reports on the whole cluster, not just itself
            # - so every node/storage/guest metric arrives twice (once per
            # collector, differing only by the host/source/instance labels).
            # Without the dedup, each of these rules would fire twice per real
            # host/pool/guest. Same root cause as the dashboard's node CPU/memory
            # panels needing the same fix - see that commit.
            - uid: proxmox-host-down-pmxdell
              title: Proxmox Host Down (pmxdell)
              condition: A
              for: 10m
              noDataState: OK
              data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: mimir-internal
                  model:
                    expr: absent_over_time(up{job="node", host="pmxdell"}[10m])
                    intervalMs: 60000
                    maxDataPoints: 43200
              annotations:
                summary: pmxdell has not reported metrics in 10+ minutes.
                description: Alloy on pmxdell may be down, or the host itself is unreachable.
              labels:
                severity: critical
            - uid: proxmox-host-down-pxhp
              title: Proxmox Host Down (pxhp)
              condition: A
              for: 10m
              noDataState: OK
              data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: mimir-internal
                  model:
                    expr: absent_over_time(up{job="node", host="pxhp"}[10m])
                    intervalMs: 60000
                    maxDataPoints: 43200
              annotations:
                summary: pxhp has not reported metrics in 10+ minutes.
                description: Alloy on pxhp may be down, or the host itself is unreachable.
              labels:
                severity: critical
            - uid: proxmox-host-high-load
              title: Proxmox Host High CPU Load
              condition: A
              for: 10m
              noDataState: OK
              data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: mimir-internal
                  model:
                    expr: max by (id) (pve_cpu_usage_ratio{id=~"node/.+"}) > 0.85
                    intervalMs: 60000
                    maxDataPoints: 43200
              annotations:
                summary: A Proxmox host is over 85% CPU utilization.
                description: Check the id label for which host - see pve_cpu_usage_ratio for the exact value.
              labels:
                severity: warning
            - uid: proxmox-storage-70
              title: Proxmox Storage 70% Full
              condition: A
              for: 10m
              noDataState: OK
              data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: mimir-internal
                  model:
                    expr: max by (id) (pve_disk_usage_bytes{id=~"storage/.+"} / pve_disk_size_bytes{id=~"storage/.+"}) > 0.7
                    intervalMs: 60000
                    maxDataPoints: 43200
              annotations:
                summary: A Proxmox storage pool is over 70% full.
                description: Check the id label for which storage pool - consider adding capacity.
              labels:
                severity: warning
            - uid: proxmox-storage-85
              title: Proxmox Storage 85% Full
              condition: A
              for: 10m
              noDataState: OK
              data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: mimir-internal
                  model:
                    expr: max by (id) (pve_disk_usage_bytes{id=~"storage/.+"} / pve_disk_size_bytes{id=~"storage/.+"}) > 0.85
                    intervalMs: 60000
                    maxDataPoints: 43200
              annotations:
                summary: A Proxmox storage pool is over 85% full - CRITICAL.
                description: Check the id label for which storage pool - immediate action required.
              labels:
                severity: critical
            - uid: proxmox-guest-stopped
              title: Proxmox VM/CT Stopped
              condition: A
              for: 15m
              noDataState: OK
              data:
                - refId: A
                  relativeTimeRange:
                    from: 900
                    to: 0
                  datasourceUid: mimir-internal
                  model:
                    expr: max by (id) (pve_up{id=~"qemu/.+|lxc/.+"}) == 0
                    intervalMs: 60000
                    maxDataPoints: 43200
              annotations:
                summary: A Proxmox VM or CT has been stopped for 15+ minutes.
                description: Check the id label for which guest. Can't distinguish an intentional shutdown from an unexpected one from this metric alone - silence if expected.
              labels:
                severity: warning
configMaps:
  postgres-init-data:
    enabled: true
    data:
      init-data.sh: |
        #!/bin/bash
        set -e;
        if [ -n "${POSTGRES_NON_ROOT_USER:-}" ] && [ -n "${POSTGRES_NON_ROOT_PASSWORD:-}" ]; then
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
            CREATE USER "${POSTGRES_NON_ROOT_USER}" WITH PASSWORD '${POSTGRES_NON_ROOT_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO "${POSTGRES_NON_ROOT_USER}";
            ALTER DATABASE ${POSTGRES_DB} OWNER TO "${POSTGRES_NON_ROOT_USER}";
        EOSQL
        else
          echo "SETUP INFO: No Environment variables given!"
        fi

