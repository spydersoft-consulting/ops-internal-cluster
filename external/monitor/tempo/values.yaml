tempo-distributed:
  multitenancyEnabled: true
  global:
    dnsService: rke2-coredns-rke2-coredns
    dnsNamespace: kube-system
  tempo:
    # Was previously set as a sibling of `tempo:` instead of nested inside it -
    # templates read .Values.tempo.revisionHistoryLimit, so that placement was
    # a silent no-op (confirmed via helm template: rendered as the chart
    # default of 10, not 1). Fixed nesting here.
    revisionHistoryLimit: 1
    structuredConfig:
      # Global compactor configuration
      compactor:
        compaction:
          block_retention: 720h  # 30 days default
      # Per-tenant overrides
      overrides:
        defaults:
          metrics_generator:
            processors: []
        per_tenant_override_config: /overrides/overrides.yaml
  search:
    enabled: true
  distributor:
    service:
      type: NodePort
    # Had no requests/limits at all. Measured actual usage is ~37m/40Mi.
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    # Reproduces the chart's own default (hard same-node/soft same-zone
    # same-component anti-affinity - see chart values.yaml) plus an added
    # soft rule to avoid nodes already running another heavy/stateful
    # component from Mimir, Loki, or Tempo. Chart templates this field as a
    # raw string passed through `tpl`, so overriding it replaces the default
    # wholesale rather than merging - the original rules are reproduced here
    # rather than lost.
    affinity: |
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                {{- include "tempo.selectorLabels" (dict "ctx" . "component" "distributor") | nindent 16 }}
            topologyKey: kubernetes.io/hostname
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  {{- include "tempo.selectorLabels" (dict "ctx" . "component" "distributor") | nindent 18 }}
              topologyKey: topology.kubernetes.io/zone
          - weight: 75
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values: [distributor, ingester, store-gateway, kafka, write, read, backend, compactor]
              topologyKey: kubernetes.io/hostname
    extraArgs:
      - -config.expand-env=true
    extraEnvFrom:
      - secretRef:
          name: tempo-storage-secret
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: tempo-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /overrides
        readOnly: true
  queryFrontend:
    # Measured actual usage is ~2m/29Mi.
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 150m
        memory: 256Mi
    extraArgs:
      - -config.expand-env=true
    extraEnvFrom:
      - secretRef:
          name: tempo-storage-secret
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: tempo-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /overrides
        readOnly: true
  querier:
    # Measured actual usage is ~20-50m/25-50Mi.
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    extraArgs:
      - -config.expand-env=true
    extraEnvFrom:
      - secretRef:
          name: tempo-storage-secret
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: tempo-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /overrides
        readOnly: true
  compactor:
    # Had no requests/limits. Measured actual usage is ~14m/51Mi, but
    # compaction runs can spike higher than steady-state, so limit has more
    # headroom than the others.
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 384Mi
    # See the matching comment on distributor.affinity above.
    affinity: |
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                {{- include "tempo.selectorLabels" (dict "ctx" . "component" "compactor") | nindent 16 }}
            topologyKey: kubernetes.io/hostname
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  {{- include "tempo.selectorLabels" (dict "ctx" . "component" "compactor") | nindent 18 }}
              topologyKey: topology.kubernetes.io/zone
          - weight: 75
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values: [distributor, ingester, store-gateway, kafka, write, read, backend, compactor]
              topologyKey: kubernetes.io/hostname
    extraArgs:
      - -config.expand-env=true
    extraEnvFrom:
      - secretRef:
          name: tempo-storage-secret
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: tempo-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /overrides
        readOnly: true
  ingester:
    # Had no requests/limits. Measured actual usage is ~22m/40Mi, but trace
    # ingestion can burst, so limit has more headroom.
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 512Mi
    # See the matching comment on distributor.affinity above. Ingester's
    # chart default only has the soft same-node/soft same-zone rules (no
    # hard requirement), reproduced here.
    affinity: |
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  {{- include "tempo.selectorLabels" (dict "ctx" . "component" "ingester") | nindent 18 }}
              topologyKey: kubernetes.io/hostname
          - weight: 75
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  {{- include "tempo.selectorLabels" (dict "ctx" . "component" "ingester") | nindent 18 }}
              topologyKey: topology.kubernetes.io/zone
          - weight: 75
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values: [distributor, ingester, store-gateway, kafka, write, read, backend, compactor]
              topologyKey: kubernetes.io/hostname
    extraArgs:
      - -config.expand-env=true
    extraEnvFrom:
      - secretRef:
          name: tempo-storage-secret
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: tempo-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /overrides
        readOnly: true
  metricsGenerator:
    enabled: true
    # Measured actual usage is ~17m/26Mi.
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    extraArgs:
      - -config.expand-env=true
    extraEnvFrom:
      - secretRef:
          name: tempo-storage-secret
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: tempo-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /overrides
        readOnly: true
  minio:
    enabled: false
  storage:
    trace:
      backend: s3
      s3:
        bucket: tempo
        endpoint: cloud.gerega.net:3900
        access_key: ${STORAGE_USERNAME}
        secret_key: ${STORAGE_PASSWORD}
        forcepathstyle: true
        insecure: true
  traces:
    jaeger:
      grpc:
        enabled: true
      thriftBinary:
        enabled: true
      thriftCompact:
        enabled: true
      thriftHttp:
        enabled: true
    zipkin:
      enabled: true
    otlp:
      grpc:
        enabled: true
      http:
        enabled: true
  gateway:
    enabled: true
    service:
      labels:
        mirror.linkerd.io/exported: "true"
    ingress:
      enabled: false  # Migrated to Gateway API HTTPRoute
      hosts:
        - host: "tempo.mattgerega.net"
          paths:
            - path: /
              pathType: Prefix
      annotations:
        kubernetes.io/ingress.class: nginx
      tls: []
