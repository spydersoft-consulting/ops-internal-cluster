mimir-distributed:
  global:
    dnsService: rke2-coredns-rke2-coredns
    dnsNamespace: kube-system
    extraEnvFrom:
      - secretRef:
          name: mimir-storage-secret
  minio:
    enabled: false
  # Ingest-storage (Kafka) was the source of the 2026-07 incident: an
  # ingester with no committed offset replayed a full day of backlog on
  # startup and OOMed/destabilized nodes. With everything at replicas:1 on a
  # single Proxmox host there's no failure domain for Kafka to actually
  # decouple - reverting to classic direct distributor->ingester push
  # removes the whole failure class. See mimir.structuredConfig below for
  # the corresponding ingest_storage/push_grpc_method_enabled flip.
  kafka:
    enabled: false
  # Only needed to coordinate zone-by-zone rollouts; ingester/store_gateway
  # zoneAwareReplication are both disabled below (single physical host, no
  # zone-level HA to protect), so there's nothing left for it to coordinate.
  rollout_operator:
    enabled: false
  alertmanager:
    enabled: true
    # GitOps (ArgoCD) is the source of truth for rollback, not `kubectl
    # rollout undo` - no need to keep more than the current revision around.
    revisionHistoryLimit: 1
    # Self-monitoring: Alloy's annotation-based discovery (metrics.spydersoft.io)
    # picks this up so the Mimir mixin dashboards below have data. There's no
    # prometheus-operator here for ServiceMonitor, hence the annotations instead
    # of metaMonitoring.serviceMonitor.
    service:
      annotations:
        metrics.spydersoft.io/scrape: "true"
        metrics.spydersoft.io/port: "8080"
        metrics.spydersoft.io/path: "/metrics"
    # Chart default (10m/32Mi request, no limit) was skipped by the 2026-07-14
    # tuning pass along with the rest of this file. Actual usage is ~23m/32Mi -
    # the old CPU request was already below actual usage. Raised request to
    # cover it and added a limit for an OOM ceiling.
    resources:
      requests:
        cpu: 30m
        memory: 64Mi
      limits:
        cpu: 150m
        memory: 256Mi
    persistentVolume:
      storageClass: nfs-client
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: mimir-distributed-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/mimir-runtime-overrides
        readOnly: true
  distributor:
    # Was 2 for HA - live ingestion is ~2000 samples/sec combined across all
    # 3 tenants (measured 2026-07-14), several orders of magnitude below
    # what a single distributor handles. There's no second physical node
    # for a second replica to protect against here anyway.
    replicas: 1
    revisionHistoryLimit: 1
    # Was 200m/1Gi request, 1 CPU/3Gi limit - measured actual usage is only
    # ~120m/100Mi (~10% of request). Trimmed to match, with headroom for
    # request bursts.
    #
    # Limit raised again after the 2026-07-15 outage: whenever mimir is
    # down for a while, every Alloy agent buffers its remote-write WAL and
    # replays the whole backlog in a burst the moment writes succeed again.
    # That burst OOMKilled the distributor repeatedly at the trimmed 768Mi
    # limit. Steady-state usage is unaffected by this - only the limit
    # (OOM ceiling) needs the headroom for replay bursts, not the request.
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 2Gi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values: [distributor, ingester, store-gateway, kafka, write, read, backend, compactor]
              topologyKey: kubernetes.io/hostname
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: mimir-distributed-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/mimir-runtime-overrides
        readOnly: true
    service:
      annotations:
        metrics.spydersoft.io/scrape: "true"
        metrics.spydersoft.io/port: "8080"
        metrics.spydersoft.io/path: "/metrics"
  ingester:
    # Was 3 (zone-a/b/c), one full replica of the series set per zone -
    # zone anti-affinity protects against losing a physical node, which
    # doesn't apply here (single Proxmox host). Live series count is
    # ~166k, comfortably within a single ingester (measured 2026-07-14).
    replicas: 1
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 3Gi
    persistentVolume:
      storageClass: nfs-client
    zoneAwareReplication:
      enabled: false
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values: [distributor, ingester, store-gateway, kafka, write, read, backend, compactor]
              topologyKey: kubernetes.io/hostname
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: mimir-distributed-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/mimir-runtime-overrides
        readOnly: true
    service:
      annotations:
        metrics.spydersoft.io/scrape: "true"
        metrics.spydersoft.io/port: "8080"
        metrics.spydersoft.io/path: "/metrics"
  store_gateway:
    # Was 3 (zone-a/b/c) for the same reason as ingester above - dropped
    # to match, no zone-level HA benefit on a single physical host.
    replicas: 1
    # Was 100m/512Mi request, 500m/2Gi limit - measured actual usage is only
    # ~40m/40Mi (~7% of request). Trimmed to match, with headroom for query
    # bursts (block index/chunk loading).
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 512Mi
    persistentVolume:
      storageClass: nfs-client
    zoneAwareReplication:
      enabled: false
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values: [distributor, ingester, store-gateway, kafka, write, read, backend, compactor]
              topologyKey: kubernetes.io/hostname
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: mimir-distributed-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/mimir-runtime-overrides
        readOnly: true
    service:
      annotations:
        metrics.spydersoft.io/scrape: "true"
        metrics.spydersoft.io/port: "8080"
        metrics.spydersoft.io/path: "/metrics"
  compactor:
    # Had only the chart default (100m/512Mi request, no limit) - measured
    # actual usage is ~26m/1.4Gi (memory ~2.7x over the old request; no
    # OOM since there's no limit, but the request should reflect reality).
    resources:
      requests:
        cpu: 50m
        memory: 1536Mi
      limits:
        cpu: 500m
        memory: 2Gi
    persistentVolume:
      storageClass: nfs-client
    # Had no affinity at all previously (unlike the other heavy components).
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 75
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values: [distributor, ingester, store-gateway, kafka, write, read, backend, compactor]
              topologyKey: kubernetes.io/hostname
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: mimir-distributed-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/mimir-runtime-overrides
        readOnly: true
    service:
      annotations:
        metrics.spydersoft.io/scrape: "true"
        metrics.spydersoft.io/port: "8080"
        metrics.spydersoft.io/path: "/metrics"
  chunks-cache:
    enabled: false
    replicas: 2
  index-cache:
    enabled: false
    replicas: 3
  results-cache:
    enabled: false
    replicas: 2
  ruler:
    enabled: true
    revisionHistoryLimit: 1
    # 2026-07-14 tuning pass set this to 60m/96Mi request, 300m/384Mi limit
    # based on a ~42m/61Mi usage measurement - too tight for the actual rule
    # set (recording/alerting rules evaluated across all 3 tenants:
    # internal/production/nonproduction). Ruler was OOMKilling every few
    # minutes (2026-07-16), which took down /prometheus/api/v1/alerts via
    # mimir-gateway (502s) and fired Grafana DatasourceNoData alerts. Raised
    # limit for headroom; request bumped to reflect real steady-state usage.
    resources:
      requests:
        cpu: 60m
        memory: 200Mi
      limits:
        cpu: 300m
        memory: 768Mi
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: mimir-distributed-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/mimir-runtime-overrides
        readOnly: true
    service:
      annotations:
        metrics.spydersoft.io/scrape: "true"
        metrics.spydersoft.io/port: "8080"
        metrics.spydersoft.io/path: "/metrics"
  querier:
    # Chart default is 2 (HA query path) - no benefit on a single physical
    # host, and query volume here is trivial.
    replicas: 1
    revisionHistoryLimit: 1
    # Chart default (100m/128Mi request, no limit) was skipped by the
    # 2026-07-14 tuning pass. Measured actual usage is ~29m/31Mi.
    resources:
      requests:
        cpu: 30m
        memory: 64Mi
      limits:
        cpu: 150m
        memory: 256Mi
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: mimir-distributed-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/mimir-runtime-overrides
        readOnly: true
    service:
      annotations:
        metrics.spydersoft.io/scrape: "true"
        metrics.spydersoft.io/port: "8080"
        metrics.spydersoft.io/path: "/metrics"
  query_frontend:
    revisionHistoryLimit: 1
    # Chart default (100m/128Mi request, no limit) was skipped by the
    # 2026-07-14 tuning pass. Measured actual usage is ~28m/29Mi.
    resources:
      requests:
        cpu: 30m
        memory: 64Mi
      limits:
        cpu: 150m
        memory: 256Mi
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: mimir-distributed-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/mimir-runtime-overrides
        readOnly: true
    service:
      annotations:
        metrics.spydersoft.io/scrape: "true"
        metrics.spydersoft.io/port: "8080"
        metrics.spydersoft.io/path: "/metrics"
  query_scheduler:
    # The 2026-07-14 tuning pass disabled this assuming the chart would
    # clear frontend/frontend_worker scheduler_address when disabled - it
    # doesn't (mimir-distributed always renders a literal
    # mimir-query-scheduler-headless address in both). With no scheduler
    # behind that address, no querier worker ever connects to the frontend
    # and queries sit queued until the client (Grafana) times out. Tried
    # blanking scheduler_address instead of running the scheduler, but
    # Mimir's query-frontend module fails to start ("missing address") when
    # it's set to "" - re-enabling the scheduler is the supported way to
    # not hardcode a dangling address. Single replica - only one querier,
    # no fan-out to coordinate.
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 256Mi
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: mimir-distributed-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/mimir-runtime-overrides
        readOnly: true
  overrides_exporter:
    revisionHistoryLimit: 1
    # Chart default (100m/128Mi request, no limit) was skipped by the
    # 2026-07-14 tuning pass. Measured actual usage is ~10m/17Mi.
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 256Mi
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: mimir-distributed-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/mimir-runtime-overrides
        readOnly: true
  # NOTE: this component was renamed from `nginx` to `gateway` upstream; the
  # old `nginx:` key is silently ignored by 6.1.0 (Helm doesn't error on
  # unknown values keys), so this override had actually been a no-op - the
  # live service only had the label because it was baked in before the chart
  # was upgraded past the rename.
  gateway:
    revisionHistoryLimit: 1
    # nginx gateway - no CPU request previously set. Observed usage ~1-2m
    # (fronts a low-traffic single-tenant setup); floored to a sensible
    # minimum rather than tracking usage exactly.
    resources:
      requests:
        cpu: 5m
    service:
      labels:
        mirror.linkerd.io/exported: "true"
  ingress:
    enabled: false  # Migrated to Gateway API HTTPRoute
    hosts:
      - mimir.mattgerega.net
    annotations:
      kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/service-upstream: "true"
    tls: []
  mimir:
    structuredConfig:
      # Runtime configuration for per-tenant overrides
      runtime_config:
        file: /etc/mimir-runtime-overrides/runtime-overrides.yaml
        period: 10s

      # Reverted to classic architecture (direct distributor->ingester push)
      # - see kafka.enabled: false above for why. push_grpc_method_enabled
      # re-enables the classic push RPC that ingest_storage otherwise
      # replaces with the Kafka consume path.
      ingest_storage:
        enabled: false
      ingester:
        push_grpc_method_enabled: true
        ring:
          # Chart default is 3 (quorum write needs 2 live replicas). The
          # 2026-07-14 tuning pass dropped ingester replicas to 1 without
          # updating this, so every distributor write has been failing with
          # "at least 2 live replicas required, could only find 1" since -
          # no metrics ingested. Matches the single-ingester topology.
          replication_factor: 1

      alertmanager_storage:
        backend: s3
        s3:
          access_key_id: ${STORAGE_USERNAME}
          bucket_name: mimir-ruler
          endpoint: cloud.gerega.net:3900
          insecure: true
          secret_access_key: ${STORAGE_PASSWORD}
      blocks_storage:
        s3:
          access_key_id: ${STORAGE_USERNAME}
          bucket_name: mimir-tsdb
          endpoint: cloud.gerega.net:3900
          insecure: true
          secret_access_key: ${STORAGE_PASSWORD}
      ruler_storage:
        backend: s3
        s3:
          access_key_id: ${STORAGE_USERNAME}
          bucket_name: mimir-ruler
          endpoint: cloud.gerega.net:3900
          insecure: true
          secret_access_key: ${STORAGE_PASSWORD}
      limits:
        max_global_series_per_user: 1000000
        ingestion_rate: 400000
        ingestion_burst_size: 1000000
        compactor_blocks_retention_period: 1y
        out_of_order_time_window:
  metaMonitoring:
    # No prometheus-operator here, so this stays disabled - self-monitoring
    # goes through the metrics.spydersoft.io annotations added to each
    # component's `service:` block above (Alloy's existing annotation-based
    # discovery), not a ServiceMonitor CRD.
    serviceMonitor:
      enabled: false
      interval: 1m
      scrapeTimeout: 30s
    # Ships the official Mimir mixin dashboards (Writes/Reads/Compactor/
    # Alertmanager/Ruler/Overview etc.) as grafana_dashboard-labeled
    # ConfigMaps, same sidecar mechanism as the hand-picked dashboards in
    # the grafana chart. Verify job-label matching once deployed - the
    # mixin expects the chart's default resource naming, which nameOverride/
    # fullnameOverride (both null here) preserves.
    dashboards:
      enabled: true
      annotations:
        grafana_folder: Mimir
        # The "reads" mixin dashboard alone is ~300KB of JSON. ArgoCD's
        # legacy last-applied-configuration annotation maintenance (which it
        # runs even under the app-level ServerSideApply=true syncOption, to
        # backfill the annotation on resources that lack it) duplicates the
        # whole object into an annotation, blowing past Kubernetes' 256KiB
        # metadata.annotations cap and failing every sync. Forcing SSA at
        # the resource level skips that legacy annotation path entirely.
        argocd.argoproj.io/sync-options: ServerSideApply=true
