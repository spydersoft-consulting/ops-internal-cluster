mimir-distributed:
  global:
    dnsService: rke2-coredns-rke2-coredns
    dnsNamespace: kube-system
    extraEnvFrom:
      - secretRef:
          name: mimir-storage-secret
  minio:
    enabled: false
  kafka:
    enabled: true
    persistence:
      storageClassName: nfs-client
    # Had a 1Gi/1cpu request but no limit at all (unbounded). Measured actual
    # usage is ~154m/250Mi; limit gives headroom without leaving it
    # ungoverned.
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi
    # 24h (chart default) meant an ingester with no committed offset (e.g.
    # after an incident) would replay a full day of backlog on startup - that
    # replay burst repeatedly OOMed/destabilized nodes during the 2026-07
    # recovery. 6h keeps enough buffer for a normal restart/maintenance
    # window while capping the worst-case replay size at ~1.5GB instead of
    # ~6GB (current 24h usage, measured directly off the PVC).
    logRetentionHours: 6
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values: [distributor, ingester, store-gateway, kafka, write, read, backend, compactor]
              topologyKey: kubernetes.io/hostname
  alertmanager:
    enabled: true
    # GitOps (ArgoCD) is the source of truth for rollback, not `kubectl
    # rollout undo` - no need to keep more than the current revision around.
    revisionHistoryLimit: 1
    persistentVolume:
      storageClass: nfs-client
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: mimir-distributed-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/mimir-runtime-overrides
        readOnly: true
  distributor:
    replicas: 2
    revisionHistoryLimit: 1
    # Was 200m/1Gi request, 1 CPU/3Gi limit - measured actual usage is only
    # ~120m/100Mi (~10% of request). Trimmed to match, with headroom for
    # request bursts.
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values: [distributor, ingester, store-gateway, kafka, write, read, backend, compactor]
              topologyKey: kubernetes.io/hostname
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: mimir-distributed-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/mimir-runtime-overrides
        readOnly: true
  ingester:
    replicas: 3
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 3Gi
    persistentVolume:
      storageClass: nfs-client
    # ingester.affinity is ignored when zoneAwareReplication.enabled=true (which it
    # is here, since we run zone-a/b/c as separate StatefulSets) - per-zone affinity
    # has to go through zoneAwareReplication.zones[].extraAffinity instead.
    zoneAwareReplication:
      # Activates the chart's built-in anti-affinity so zone-a/b/c never share a node.
      topologyKey: kubernetes.io/hostname
      zones:
        - name: zone-a
          nodeSelector: null
          extraAffinity: &mimirHeavyAntiAffinity
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/component
                          operator: In
                          values: [distributor, ingester, store-gateway, kafka, write, read, backend, compactor]
                    topologyKey: kubernetes.io/hostname
          storageClass: null
          noDownscale: false
          downscaleLeader: null
          prepareDownscale: true
        - name: zone-b
          nodeSelector: null
          extraAffinity: *mimirHeavyAntiAffinity
          storageClass: null
          noDownscale: false
          downscaleLeader: null
          prepareDownscale: true
        - name: zone-c
          nodeSelector: null
          extraAffinity: *mimirHeavyAntiAffinity
          storageClass: null
          noDownscale: false
          downscaleLeader: null
          prepareDownscale: true
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: mimir-distributed-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/mimir-runtime-overrides
        readOnly: true
  store_gateway:
    replicas: 3
    # Was 100m/512Mi request, 500m/2Gi limit - measured actual usage is only
    # ~40m/40Mi (~7% of request). Trimmed to match, with headroom for query
    # bursts (block index/chunk loading).
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 512Mi
    persistentVolume:
      storageClass: nfs-client
    # store_gateway.affinity is ignored when zoneAwareReplication.enabled=true
    # (which it is here) - see the matching comment under ingester above.
    zoneAwareReplication:
      topologyKey: kubernetes.io/hostname
      zones:
        - name: zone-a
          nodeSelector: null
          extraAffinity: *mimirHeavyAntiAffinity
          storageClass: null
          noDownscale: false
          downscaleLeader: null
          prepareDownscale: true
        - name: zone-b
          nodeSelector: null
          extraAffinity: *mimirHeavyAntiAffinity
          storageClass: null
          noDownscale: false
          downscaleLeader: null
          prepareDownscale: true
        - name: zone-c
          nodeSelector: null
          extraAffinity: *mimirHeavyAntiAffinity
          storageClass: null
          noDownscale: false
          downscaleLeader: null
          prepareDownscale: true
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: mimir-distributed-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/mimir-runtime-overrides
        readOnly: true
  compactor:
    persistentVolume:
      storageClass: nfs-client
    # Had no affinity at all previously (unlike the other heavy components).
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 75
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values: [distributor, ingester, store-gateway, kafka, write, read, backend, compactor]
              topologyKey: kubernetes.io/hostname
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: mimir-distributed-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/mimir-runtime-overrides
        readOnly: true
  chunks-cache:
    enabled: false
    replicas: 2
  index-cache:
    enabled: false
    replicas: 3
  results-cache:
    enabled: false
    replicas: 2
  ruler:
    enabled: true
    revisionHistoryLimit: 1
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: mimir-distributed-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/mimir-runtime-overrides
        readOnly: true
  querier:
    revisionHistoryLimit: 1
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: mimir-distributed-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/mimir-runtime-overrides
        readOnly: true
  query_frontend:
    revisionHistoryLimit: 1
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: mimir-distributed-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/mimir-runtime-overrides
        readOnly: true
  query_scheduler:
    revisionHistoryLimit: 1
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: mimir-distributed-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/mimir-runtime-overrides
        readOnly: true
  overrides_exporter:
    revisionHistoryLimit: 1
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: mimir-distributed-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/mimir-runtime-overrides
        readOnly: true
  # NOTE: this component was renamed from `nginx` to `gateway` upstream; the
  # old `nginx:` key is silently ignored by 6.1.0 (Helm doesn't error on
  # unknown values keys), so this override had actually been a no-op - the
  # live service only had the label because it was baked in before the chart
  # was upgraded past the rename.
  gateway:
    revisionHistoryLimit: 1
    service:
      labels:
        mirror.linkerd.io/exported: "true"
  ingress:
    enabled: false  # Migrated to Gateway API HTTPRoute
    hosts:
      - mimir.mattgerega.net
    annotations:
      kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/service-upstream: "true"
    tls: []
  mimir:
    structuredConfig:
      # Runtime configuration for per-tenant overrides
      runtime_config:
        file: /etc/mimir-runtime-overrides/runtime-overrides.yaml
        period: 10s

      # Only affects ingesters with no previously-committed Kafka offset (e.g.
      # zone-b/zone-c after the 2026-07 incident). Ingesters with a real
      # committed offset (zone-a) are unaffected and keep consuming from where
      # they left off. Defaults to "start", which replays the full Kafka
      # retention window (24h) on first startup - that backlog replay was
      # repeatedly OOMing/destabilizing nodes during recovery. "end" skips the
      # backlog and starts from the live tip instead; the data isn't lost
      # (zone-a already has it and ships blocks to durable S3 storage), we're
      # just accepting a gap in zone-b/zone-c's local redundant copy.
      ingest_storage:
        kafka:
          consume_from_position_at_startup: end

      alertmanager_storage:
        backend: s3
        s3:
          access_key_id: ${STORAGE_USERNAME}
          bucket_name: mimir-ruler
          endpoint: cloud.gerega.net:3900
          insecure: true
          secret_access_key: ${STORAGE_PASSWORD}
      blocks_storage:
        s3:
          access_key_id: ${STORAGE_USERNAME}
          bucket_name: mimir-tsdb
          endpoint: cloud.gerega.net:3900
          insecure: true
          secret_access_key: ${STORAGE_PASSWORD}
      ruler_storage:
        backend: s3
        s3:
          access_key_id: ${STORAGE_USERNAME}
          bucket_name: mimir-ruler
          endpoint: cloud.gerega.net:3900
          insecure: true
          secret_access_key: ${STORAGE_PASSWORD}
      limits:
        max_global_series_per_user: 1000000
        ingestion_rate: 400000
        ingestion_burst_size: 1000000
        compactor_blocks_retention_period: 1y
        out_of_order_time_window:
  metaMonitoring:
    serviceMonitor:
      enabled: false
      interval: 1m
      scrapeTimeout: 30s
