loki:
  global:
    dnsService: rke2-coredns-rke2-coredns
    dnsNamespace: kube-system
  # GitOps (ArgoCD) is the rollback mechanism here, not kubectl rollout undo.
  # Single global key - applies to every Loki component's template.
  revisionHistoryLimit: 1
  loki:
    storage:
      bucketNames:
        chunks: loki-chunks
        ruler: loki-ruler
        admin: loki-admin
      type: s3
      s3:
        accessKeyId: ${STORAGE_USERNAME}
        secretAccessKey: ${STORAGE_PASSWORD}
        region: us-east-1
        endpoint: http://cloud.gerega.net:3900
        s3ForcePathStyle: true
        insecure: true
    auth_enabled: true
    structuredConfig:
      # Runtime configuration for per-tenant overrides
      runtime_config:
        file: /etc/loki/runtime-overrides/runtime-overrides.yaml
        period: 10s

      # Compactor configuration (replaces table_manager for TSDB)
      compactor:
        working_directory: /var/loki/compactor
        compaction_interval: 10m
        retention_enabled: true
        retention_delete_delay: 2h
        retention_delete_worker_count: 150
        delete_request_store: s3

      schema_config:
        configs:
          # Single schema config for new installation - start fresh with TSDB
          - from: 2024-12-10
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: index_
              period: 24h

      limits_config:
        allow_structured_metadata: true
        retention_period: 720h  # 30 days default (overridden per-tenant via runtime config)
        # Per-stream retention overrides (for specific namespaces)
        retention_stream:
          - selector: '{namespace="argocd"}'
            priority: 1
            period: 24h
        
    rulerConfig:
      alertmanager_url: https://mimir.mattgerega.net
      enable_alertmanager_v2: true
    # Chart default is 3, requiring a quorum of write/read replicas to
    # ack. Dropped to match write/read/backend replicas below - single
    # physical host, no quorum to protect.
    commonConfig:
      replication_factor: 1
  minio:
    enabled: false
  write:
    # Was 3 for HA - live write volume is ~2.6KB/sec / ~2.4 lines/sec
    # combined across all 4 tenants (measured 2026-07-14), nowhere close
    # to needing horizontal write scale-out.
    replicas: 1
    # Had no requests/limits at all (chart default is also unset) - meaning
    # zero scheduler visibility and no OOM ceiling. Measured actual usage is
    # ~180m/100Mi.
    resources:
      requests:
        cpu: 150m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # Chart's own default already gives write pods a hard same-component
    # anti-affinity (they'll never share a node with each other). This adds
    # a soft rule on top to also avoid nodes already running a heavy/stateful
    # component from Mimir, Tempo, or Loki's own read/backend. Native map
    # value here (unlike Tempo's string-templated affinity), so Helm deep-
    # merges this with the chart default rather than replacing it - verified
    # via helm template that both rules render together.
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 75
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values: [distributor, ingester, store-gateway, kafka, write, read, backend, compactor]
              topologyKey: kubernetes.io/hostname
    extraArgs:
      - -config.expand-env=true
    extraEnvFrom:
      - secretRef:
          name: loki-storage-secret
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: loki-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/loki/runtime-overrides
        readOnly: true
    persistence:
      enabled: true
      storageClass: nfs-client
      size: 10Gi
    # Self-monitoring via Alloy's annotation-based discovery (no
    # prometheus-operator here for ServiceMonitor).
    service:
      annotations:
        metrics.spydersoft.io/scrape: "true"
        metrics.spydersoft.io/port: "3100"
        metrics.spydersoft.io/path: "/metrics"
  read:
    # Was 3 - same reasoning as write above.
    replicas: 1
    # Measured actual usage is ~200m/240Mi (heaviest of the three Loki
    # components - runs queries).
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 750m
        memory: 768Mi
    # See the matching comment on write.affinity above.
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 75
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values: [distributor, ingester, store-gateway, kafka, write, read, backend, compactor]
              topologyKey: kubernetes.io/hostname
    extraArgs:
      - -config.expand-env=true
    extraEnvFrom:
      - secretRef:
          name: loki-storage-secret
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: loki-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/loki/runtime-overrides
        readOnly: true
    persistence:
      enabled: true
      storageClass: nfs-client
      size: 10Gi
    service:
      annotations:
        metrics.spydersoft.io/scrape: "true"
        metrics.spydersoft.io/port: "3100"
        metrics.spydersoft.io/path: "/metrics"
  backend:
    # Was 3 - same reasoning as write above.
    replicas: 1
    # Measured actual usage is ~85m/155Mi.
    resources:
      requests:
        cpu: 100m
        memory: 192Mi
      limits:
        cpu: 400m
        memory: 512Mi
    # See the matching comment on write.affinity above.
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 75
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values: [distributor, ingester, store-gateway, kafka, write, read, backend, compactor]
              topologyKey: kubernetes.io/hostname
    extraArgs:
      - -config.expand-env=true
    extraEnvFrom:
      - secretRef:
          name: loki-storage-secret
    extraVolumes:
      - name: runtime-overrides
        configMap:
          name: loki-runtime-overrides
    extraVolumeMounts:
      - name: runtime-overrides
        mountPath: /etc/loki/runtime-overrides
        readOnly: true
    persistence:
      enabled: true
      storageClass: nfs-client
      size: 10Gi
    service:
      annotations:
        metrics.spydersoft.io/scrape: "true"
        metrics.spydersoft.io/port: "3100"
        metrics.spydersoft.io/path: "/metrics"
  gateway:
    replicas: 1
    # nginx gateway - no CPU request previously set. Observed usage ~20-30m.
    resources:
      requests:
        cpu: 20m
    autoscaling:
      enabled: false
    service:
      labels:
        mirror.linkerd.io/exported: "true"
    ingress:
      enabled: false  # Migrated to Gateway API HTTPRoute
      hosts:
        - host: "loki.mattgerega.net"
          paths:
            - path: /
              pathType: Prefix
      annotations:
        kubernetes.io/ingress.class: nginx
        nginx.ingress.kubernetes.io/service-upstream: "true"
      tls: []
  tableManager:
    enabled: false
  test:
    enabled: false
  chunksCache:
    enabled: false
  # Chart default allocates 1024Mi/500m to this memcached instance -
  # measured actual usage is ~25Mi/12m.
  resultsCache:
    allocatedMemory: 128
    allocatedCPU: 100m
  # DaemonSet, one pod per node - no CPU request previously set. Observed
  # usage ~6-14m across the fleet.
  lokiCanary:
    resources:
      requests:
        cpu: 10m
  # Rules-ingestion sidecar on the backend pod (loki-sc-rules container) -
  # no CPU request previously set. Observed usage ~1m, near-idle.
  sidecar:
    resources:
      requests:
        cpu: 5m
  # memcached-exporter sidecar shared by chunksCache/resultsCache (only
  # resultsCache is enabled here) - no CPU request previously set. Observed
  # usage ~7-9m on loki-results-cache's exporter container.
  memcachedExporter:
    resources:
      requests:
        cpu: 5m
  # Ships the official Loki mixin dashboards as grafana_dashboard-labeled
  # ConfigMaps (sidecar picks them up, same mechanism as Mimir above).
  # monitoring.rules (PrometheusRule-based recording/alerting rules, which
  # some dashboard panels expect) is intentionally left disabled - it
  # requires the prometheus-operator CRDs, which aren't installed here
  # (see templates/servicemonitor.yaml's own CRD-presence guard). Loki
  # alerting goes through Grafana-native alert rules instead.
  monitoring:
    dashboards:
      enabled: true
      annotations:
        grafana_folder: Loki
serviceMonitor:
  enabled: false
  interval: 1m
  scrapeTimeout: 30s
