persistence:
  data:
    storageClass: nfs-client
    type: persistentVolumeClaim
    enabled: true
    accessMode: ReadWriteMany
    globalMounts:
    - path: /home/app/.local/share/spoolman
      readOnly: false
    size: 2Gi
controllers:
  main:
    type: deployment
    enabled: true
    containers:
      main:
        image:
          pullPolicy: IfNotPresent
          tag: 0.24.0
          repository: ghcr.io/donkie/spoolman
        # No CPU request previously set. Observed usage ~6-7m.
        resources:
          requests:
            cpu: 5m
        probes:
          readiness:
            spec:
              periodSeconds: 10
              initialDelaySeconds: 0
              failureThreshold: 3
              timeoutSeconds: 1
            enabled: true
            type: TCP
            custom: false
          startup:
            spec:
              periodSeconds: 5
              initialDelaySeconds: 0
              failureThreshold: 30
              timeoutSeconds: 1
            enabled: true
            type: TCP
            custom: false
          liveness:
            spec:
              periodSeconds: 10
              initialDelaySeconds: 0
              failureThreshold: 3
              timeoutSeconds: 1
            enabled: true
            type: TCP
            custom: false
        strategy:
          type: Recreate
        env:
          TZ: America/New_York
    revisionHistoryLimit: 3
    replicas: 1
    strategy: Recreate
service:
  main:
    controller: main
    ports:
      http:
        enabled: true
        primary: true
        port: 8000
    primary: true
    type: ClusterIP
route:
  main:
    enabled: true
    parentRefs:
    - namespace: envoy-gateway-system
      group: gateway.networking.k8s.io
      kind: Gateway
      name: main
    hostnames:
    - spoolman.mattgerega.net
    rules:
    - matches:
      - path:
          value: /
          type: PathPrefix
      backendRefs:
      - name: spoolman
        weight: 1
        group: ""
        kind: Service
        port: 8000
    kind: HTTPRoute

